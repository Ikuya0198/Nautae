<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Nautae Wine Cellar</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preload" href="fonts/montserrat-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="fonts/fonts.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #090909; color: #fff;
      font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px; font-weight: 400;
      min-height: 100vh; -webkit-font-smoothing: antialiased;
    }

    /* ===== AUTH ===== */
    #auth-screen {
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
    }
    .auth-box { width: 360px; padding: 48px 40px; border: 1px solid rgba(255,255,255,0.1); }
    .auth-logo { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; color: #c8a96e; margin-bottom: 32px; }
    .auth-title { font-size: 22px; font-weight: 300; letter-spacing: 2px; margin-bottom: 8px; }
    .auth-sub { font-size: 12px; color: rgba(255,255,255,0.35); margin-bottom: 32px; line-height: 1.7; }
    .auth-input {
      width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      color: #fff; padding: 13px 16px; margin-bottom: 10px;
      font-family: 'Montserrat', sans-serif; font-size: 13px;
      outline: none; transition: border-color 0.3s;
    }
    .auth-input:focus { border-color: rgba(200,169,110,0.5); }
    .auth-btn {
      width: 100%; background: #c8a96e; color: #080808; border: none; padding: 13px;
      font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase; cursor: pointer; margin-top: 4px;
      transition: background 0.3s;
    }
    .auth-btn:hover { background: #d4b87c; }
    .auth-err { font-size: 11px; color: #e08080; margin-top: 10px; min-height: 16px; }

    /* ===== ADMIN ===== */
    #admin-screen { display: none; padding-bottom: 100px; }

    .admin-header {
      position: sticky; top: 0; z-index: 100;
      background: #0d0d0d; border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 0 40px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .admin-header-left { display: flex; align-items: center; gap: 12px; }
    .admin-title { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.55); }
    .admin-badge { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #c8a96e; background: rgba(200,169,110,0.1); padding: 3px 8px; }
    .admin-header-right { display: flex; align-items: center; gap: 24px; }
    .header-link { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.35); cursor: pointer; transition: color 0.3s; text-decoration: none; }
    .header-link:hover { color: rgba(255,255,255,0.7); }
    .header-link.danger:hover { color: #e08080; }

    /* Token banner */
    #token-banner {
      background: rgba(200,169,110,0.07); border-bottom: 1px solid rgba(200,169,110,0.2);
      padding: 14px 40px; display: none; align-items: center; gap: 20px; flex-wrap: wrap;
    }
    #token-banner.show { display: flex; }
    .token-desc { font-size: 12px; color: rgba(255,255,255,0.55); flex: 1; min-width: 200px; }
    .token-desc strong { color: #c8a96e; }
    .token-row { display: flex; gap: 8px; }
    .token-field {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15);
      color: #fff; padding: 9px 12px; font-family: 'Montserrat', sans-serif;
      font-size: 12px; width: 260px; outline: none; transition: border-color 0.3s;
    }
    .token-field:focus { border-color: rgba(200,169,110,0.5); }
    .small-btn {
      background: #c8a96e; color: #080808; border: none; padding: 9px 18px;
      font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase; cursor: pointer; white-space: nowrap;
      transition: background 0.3s;
    }
    .small-btn:hover { background: #d4b87c; }

    /* Status bar */
    #status-bar {
      padding: 11px 40px; background: #0a0a0a;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 11px; color: rgba(255,255,255,0.3);
    }
    #status-msg { transition: color 0.4s; }
    #status-msg.ok      { color: #7dc99a; }
    #status-msg.err     { color: #e08080; }
    #status-msg.loading { color: #c8a96e; }

    /* Wine grid */
    .wines-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1px; padding: 32px 40px 0;
      background: rgba(255,255,255,0.04);
    }
    .wine-card {
      background: #0f0f0f; padding: 24px 24px 20px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .card-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 14px;
    }
    .card-num { font-size: 10px; letter-spacing: 3px; color: rgba(200,169,110,0.4); margin-bottom: 4px; }
    .card-name { font-size: 14px; font-weight: 400; letter-spacing: 0.5px; line-height: 1.3; }
    .status-pill {
      font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
      padding: 3px 9px; border-radius: 20px; flex-shrink: 0; margin-top: 2px;
    }
    .status-pill.available { background: rgba(125,201,154,0.12); color: #7dc99a; }
    .status-pill.limited   { background: rgba(200,169,110,0.12); color: #c8a96e; }
    .status-pill.sold-out  { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.3); }

    /* Card action row */
    .card-actions {
      display: flex; align-items: center; gap: 6px; margin-bottom: 18px; flex-wrap: wrap;
    }
    .card-act-btn {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.45); padding: 5px 12px;
      font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 1px;
      cursor: pointer; transition: all 0.2s;
    }
    .card-act-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .card-act-btn.danger:hover { background: rgba(224,128,128,0.12); color: #e08080; border-color: rgba(224,128,128,0.3); }
    .vis-toggle {
      display: flex; align-items: center; gap: 6px;
      font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
      color: rgba(255,255,255,0.35); cursor: pointer; margin-left: 4px;
    }
    .vis-toggle input[type="checkbox"] { accent-color: #c8a96e; width: 14px; height: 14px; cursor: pointer; }

    /* Fields */
    .field-group { margin-bottom: 11px; }
    .field-label {
      display: block; font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(255,255,255,0.28); margin-bottom: 5px;
    }
    .field-input, .field-select {
      width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      color: #fff; padding: 9px 11px; font-family: 'Montserrat', sans-serif; font-size: 12px;
      outline: none; transition: border-color 0.3s; -webkit-appearance: none; appearance: none;
    }
    .field-input:focus, .field-select:focus { border-color: rgba(200,169,110,0.5); }
    .field-select option { background: #1a1a1a; }
    textarea.field-input { resize: vertical; min-height: 90px; line-height: 1.6; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .field-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 14px 0; }

    /* Add wine button */
    #add-wine-wrap { padding: 24px 40px; }
    .add-wine-btn {
      width: 100%; background: transparent;
      border: 1px dashed rgba(200,169,110,0.3); color: rgba(200,169,110,0.6);
      padding: 14px; font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 500;
      letter-spacing: 2.5px; text-transform: uppercase; cursor: pointer; transition: all 0.3s;
    }
    .add-wine-btn:hover { border-color: rgba(200,169,110,0.6); color: #c8a96e; background: rgba(200,169,110,0.04); }

    /* Settings */
    .settings-wrap { padding: 32px 40px; max-width: 440px; border-top: 1px solid rgba(255,255,255,0.06); }
    .settings-heading { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.25); margin-bottom: 24px; }
    .settings-row { margin-bottom: 28px; }
    .settings-row .field-label { margin-bottom: 8px; }
    .input-row { display: flex; gap: 8px; }
    .input-row .field-input { flex: 1; }
    #pw-change-msg { font-size: 11px; margin-top: 8px; min-height: 16px; }

    /* Tabs */
    .admin-tabs {
      display: flex; gap: 0; padding: 0 40px; background: #0d0d0d;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .admin-tab {
      font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
      color: rgba(255,255,255,0.30); padding: 14px 22px; cursor: pointer;
      border: none; border-bottom: 2px solid transparent; margin-bottom: -1px;
      background: none; font-family: 'Montserrat', sans-serif; transition: all 0.25s;
    }
    .admin-tab.active { color: #c8a96e; border-bottom-color: #c8a96e; }
    .admin-tab:hover:not(.active) { color: rgba(255,255,255,0.6); }

    /* Gallery section */
    #gallery-section { display: none; }
    #add-photo-wrap { padding: 24px 40px; }

    /* Save bar */
    #save-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: #131313; border-top: 1px solid rgba(255,255,255,0.1);
      padding: 0 40px; height: 64px;
      display: none; align-items: center; justify-content: space-between;
    }
    #save-updated { font-size: 11px; color: rgba(255,255,255,0.22); }
    .save-btn {
      background: #c8a96e; color: #080808; border: none; padding: 13px 40px;
      font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: background 0.3s;
    }
    .save-btn:hover:not(:disabled) { background: #d4b87c; }
    .save-btn:disabled { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); cursor: not-allowed; }

    @media (max-width: 768px) {
      .admin-header, #token-banner, #status-bar, #add-wine-wrap { padding-left: 20px; padding-right: 20px; }
      .wines-grid { padding: 20px 20px 0; grid-template-columns: 1fr; }
      .settings-wrap { padding: 28px 20px; }
      #save-bar { padding: 0 20px; }
    }
  </style>
</head>
<body>

  <!-- AUTH -->
  <div id="auth-screen">
    <div class="auth-box">
      <p class="auth-logo">Nautae Wine Cellar</p>
      <h1 class="auth-title" id="auth-title">管理者ログイン</h1>
      <p class="auth-sub" id="auth-sub">管理画面にアクセスするには<br>パスワードを入力してください。</p>
      <input type="password" class="auth-input" id="auth-pw1" placeholder="Password" autocomplete="current-password">
      <input type="password" class="auth-input" id="auth-pw2" placeholder="Confirm Password" style="display:none;" autocomplete="new-password">
      <button class="auth-btn" id="auth-submit">Enter</button>
      <p class="auth-err" id="auth-err"></p>
    </div>
  </div>

  <!-- ADMIN -->
  <div id="admin-screen">
    <header class="admin-header">
      <div class="admin-header-left">
        <span class="admin-title">Nautae</span>
        <span class="admin-badge">Admin</span>
      </div>
      <div class="admin-header-right">
        <a href="shop.html" target="_blank" class="header-link">サイトを確認 ↗</a>
        <span class="header-link danger" id="btn-logout">ログアウト</span>
      </div>
    </header>

    <div id="token-banner">
      <p class="token-desc"><strong>GitHub Token が未設定です。</strong>保存機能を使うには Personal Access Token（Contents 権限）を設定してください。</p>
      <div class="token-row">
        <input type="password" class="token-field" id="token-input" placeholder="ghp_xxxxxxxxxxxx">
        <button class="small-btn" id="token-save-btn">設定する</button>
      </div>
    </div>

    <div id="status-bar"><span id="status-msg">—</span></div>

    <div class="admin-tabs">
      <button class="admin-tab active" data-tab="wines">Wines</button>
      <button class="admin-tab" data-tab="gallery">Gallery</button>
    </div>

    <div id="wines-section">
      <div class="wines-grid" id="wine-grid"></div>
      <div id="add-wine-wrap">
        <button class="add-wine-btn" id="add-wine-btn">＋ ワインを追加</button>
      </div>
    </div>

    <div id="gallery-section">
      <div class="wines-grid" id="gallery-grid"></div>
      <div id="add-photo-wrap">
        <button class="add-wine-btn" id="add-photo-btn">＋ 写真を追加</button>
      </div>
    </div>

    <div class="settings-wrap">
      <p class="settings-heading">Settings</p>

      <div class="settings-row">
        <label class="field-label">GitHub Token を変更</label>
        <div class="input-row">
          <input type="password" class="field-input" id="new-token-input" placeholder="ghp_xxxxxxxxxxxx">
          <button class="small-btn" id="new-token-save">更新</button>
        </div>
      </div>

      <div class="settings-row">
        <label class="field-label">パスワードを変更</label>
        <input type="password" class="field-input" id="new-pw1" placeholder="新しいパスワード" style="margin-bottom:8px;">
        <input type="password" class="field-input" id="new-pw2" placeholder="確認（再入力）" style="margin-bottom:8px;">
        <button class="small-btn" id="change-pw-btn">変更する</button>
        <p id="pw-change-msg"></p>
      </div>
    </div>
  </div>

  <div id="save-bar">
    <span id="save-updated">最終更新: —</span>
    <button class="save-btn" id="save-btn">保存する</button>
  </div>

  <script>
    /* ===== CONSTANTS ===== */
    const OWNER = 'Ikuya0198';
    const REPO  = 'Nautae';
    const PATH  = 'data/wines.json';

    /* ===== UTILITIES ===== */
    async function sha256(text) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }
    function b64encode(str) {
      const bytes = new TextEncoder().encode(str);
      let bin = ''; bytes.forEach(b => bin += String.fromCharCode(b));
      return btoa(bin);
    }
    function b64decode(b64) {
      const bin = atob(b64.replace(/\n/g,''));
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return new TextDecoder().decode(bytes);
    }
    function escAttr(s) {
      return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function setStatus(msg, type) {
      const el = document.getElementById('status-msg');
      el.textContent = msg; el.className = type || '';
    }

    /* ===== AUTH ===== */
    // パスワードを変更する場合: echo -n "新パスワード" | shasum -a 256 で生成したハッシュに差し替える
    const ADMIN_HASH = '3c190122aeae9ee572261eb95d842e57b93eea12a23a816eea1898588234cfd9';

    if (sessionStorage.getItem('nwc_admin_s') === '1') showAdmin();

    document.getElementById('auth-pw1').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('auth-submit').click();
    });

    document.getElementById('auth-submit').addEventListener('click', async () => {
      const pw  = document.getElementById('auth-pw1').value;
      const err = document.getElementById('auth-err');
      if (!pw) { err.textContent = 'パスワードを入力してください。'; return; }
      const hash = await sha256(pw);
      if (hash !== ADMIN_HASH) {
        err.textContent = 'パスワードが違います。';
        document.getElementById('auth-pw1').value = ''; return;
      }
      sessionStorage.setItem('nwc_admin_s', '1');
      showAdmin();
    });

    function showAdmin() {
      document.getElementById('auth-screen').style.display  = 'none';
      document.getElementById('admin-screen').style.display = 'block';
      document.getElementById('save-bar').style.display     = 'flex';
      initAdmin();
    }

    /* ===== CARD GENERATION ===== */
    function generateCardHtml(wine, idx, total) {
      const pillCls = { available:'available', limited:'limited', 'sold-out':'sold-out' }[wine.status] || 'available';
      const pillTxt = { available:'Available',  limited:'Limited',  'sold-out':'Sold Out' }[wine.status] || wine.status;
      const num = String(idx + 1).padStart(2,'0');
      const tot = String(total).padStart(2,'0');
      const opt = (v, lbl) =>
        `<option value="${v}"${(wine.status||'available')===v?' selected':''}>${lbl}</option>`;
      const checked = wine.visible !== false ? ' checked' : '';

      return `<div class="wine-card" data-wine-id="${escAttr(wine.id)}">
        <div class="card-header">
          <div>
            <p class="card-num">${num} / ${tot}</p>
            <p class="card-name">${escAttr(wine.name)||'(名称未設定)'}</p>
          </div>
          <span class="status-pill ${pillCls}">${pillTxt}</span>
        </div>
        <div class="card-actions">
          <button class="card-act-btn" data-act="up">↑ 上へ</button>
          <button class="card-act-btn" data-act="down">↓ 下へ</button>
          <button class="card-act-btn danger" data-act="del">削除</button>
          <label class="vis-toggle">
            <input type="checkbox" data-field="visible"${checked}> <span>表示</span>
          </label>
        </div>

        <div class="field-group">
          <label class="field-label">ワイン名</label>
          <input type="text" class="field-input" data-field="name" value="${escAttr(wine.name)}" placeholder='例: "Luz de Mi Alma"'>
        </div>
        <div class="field-row">
          <div class="field-group">
            <label class="field-label">サブタイトル</label>
            <input type="text" class="field-input" data-field="nameSub" value="${escAttr(wine.nameSub)}" placeholder="ルス ／ 私の魂の光">
          </div>
          <div class="field-group">
            <label class="field-label">カテゴリ</label>
            <input type="text" class="field-input" data-field="label" value="${escAttr(wine.label)}" placeholder="Limited Only">
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">画像パス</label>
          <input type="text" class="field-input" data-field="image" value="${escAttr(wine.image)}" placeholder="images/wine.webp">
        </div>

        <div class="field-divider"></div>

        <div class="field-group">
          <label class="field-label">在庫ステータス</label>
          <select class="field-select" data-field="status">
            ${opt('available','Available — 在庫あり')}
            ${opt('limited',  'Limited — 残りわずか')}
            ${opt('sold-out', 'Sold Out — 売り切れ')}
          </select>
        </div>
        <div class="field-group">
          <label class="field-label">価格（税込・円）</label>
          <input type="number" class="field-input" data-field="price" value="${wine.price!=null?wine.price:''}" placeholder="42300" min="0" step="100">
        </div>
        <div class="field-row">
          <div class="field-group">
            <label class="field-label">ヴィンテージ</label>
            <input type="text" class="field-input" data-field="vintage" value="${escAttr(wine.vintage)}" placeholder="2024">
          </div>
          <div class="field-group">
            <label class="field-label">アルコール度数</label>
            <input type="text" class="field-input" data-field="abv" value="${escAttr(wine.abv)}" placeholder="13.5%">
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">品種</label>
          <input type="text" class="field-input" data-field="variety" value="${escAttr(wine.variety)}" placeholder="Albariño 100%">
        </div>
        <div class="field-group">
          <label class="field-label">産地</label>
          <input type="text" class="field-input" data-field="region" value="${escAttr(wine.region)}" placeholder="Rías Baixas D.O.">
        </div>

        <div class="field-divider"></div>

        <div class="field-group">
          <label class="field-label">テイスティングノート（改行で段落）</label>
          <textarea class="field-input" data-field="desc" rows="5" placeholder="ワインの説明文...">${escAttr(wine.desc)}</textarea>
        </div>
        <div class="field-group">
          <label class="field-label">モバイル用説明（短め）</label>
          <input type="text" class="field-input" data-field="mobileDesc" value="${escAttr(wine.mobileDesc)}" placeholder="短い説明文">
        </div>
        <div class="field-group">
          <label class="field-label">ペアリング</label>
          <input type="text" class="field-input" data-field="pairing" value="${escAttr(wine.pairing)}" placeholder="牡蠣 · シーバス · 山羊チーズ">
        </div>
      </div>`;
    }

    function buildWineCards(wines) {
      wines = Array.isArray(wines) ? wines : [];
      const grid = document.getElementById('wine-grid');
      grid.innerHTML = wines.map((w, i) => generateCardHtml(w, i, wines.length)).join('');
      bindStatusPills();
    }

    function bindStatusPills() {
      document.querySelectorAll('.field-select[data-field="status"]').forEach(sel => {
        sel.addEventListener('change', () => {
          const pill = sel.closest('.wine-card').querySelector('.status-pill');
          const v    = sel.value;
          pill.className = 'status-pill ' + ({ available:'available', limited:'limited', 'sold-out':'sold-out' }[v] || 'available');
          pill.textContent = { available:'Available', limited:'Limited', 'sold-out':'Sold Out' }[v] || v;
        });
      });
    }

    function updateCardNums() {
      const cards = document.querySelectorAll('.wine-card');
      const tot = String(cards.length).padStart(2,'0');
      cards.forEach((card, i) => {
        card.querySelector('.card-num').textContent = String(i+1).padStart(2,'0') + ' / ' + tot;
      });
    }

    /* ===== CARD ACTIONS (event delegation) ===== */
    document.getElementById('wine-grid').addEventListener('click', e => {
      const btn = e.target.closest('[data-act]');
      if (!btn) return;
      const card  = btn.closest('.wine-card');
      const grid  = document.getElementById('wine-grid');
      const cards = Array.from(grid.querySelectorAll('.wine-card'));
      const idx   = cards.indexOf(card);
      const act   = btn.dataset.act;

      if (act === 'up' && idx > 0) {
        grid.insertBefore(card, cards[idx - 1]);
      } else if (act === 'down' && idx < cards.length - 1) {
        grid.insertBefore(cards[idx + 1], card);
      } else if (act === 'del') {
        if (cards.length <= 1) { alert('ワインは1本以上必要です。'); return; }
        if (confirm('このワインを削除しますか？この操作は「保存する」を押すまで反映されません。')) {
          card.remove();
        }
      }
      updateCardNums();
    });

    /* ===== ADD WINE ===== */
    document.getElementById('add-wine-btn').addEventListener('click', () => {
      const grid  = document.getElementById('wine-grid');
      const cards = grid.querySelectorAll('.wine-card');
      const newId = 'wine_' + Date.now();
      const total = cards.length + 1;
      const newWine = {
        id: newId, visible: true, status: 'available',
        name: '', nameSub: '', label: '', price: 0,
        vintage: '', variety: '', region: '', abv: '',
        desc: '', mobileDesc: '', pairing: '', image: ''
      };
      const div = document.createElement('div');
      div.innerHTML = generateCardHtml(newWine, cards.length, total);
      const newCard = div.firstElementChild;
      grid.appendChild(newCard);
      newCard.querySelector('.field-select[data-field="status"]').addEventListener('change', e => {
        const pill = e.target.closest('.wine-card').querySelector('.status-pill');
        const v    = e.target.value;
        pill.className   = 'status-pill ' + ({ available:'available', limited:'limited', 'sold-out':'sold-out' }[v] || 'available');
        pill.textContent = { available:'Available', limited:'Limited', 'sold-out':'Sold Out' }[v] || v;
      });
      updateCardNums();
      newCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
      newCard.querySelector('.field-input[data-field="name"]').focus();
    });

    /* ===== GALLERY CARD GENERATION ===== */
    const GALLERY_PATH = 'data/gallery.json';
    let gallerySha = null;

    function generatePhotoCardHtml(photo, idx, total) {
      const num = String(idx + 1).padStart(2,'0');
      const tot = String(total).padStart(2,'0');
      const checked = photo.visible !== false ? ' checked' : '';
      const ea = s => escAttr(s || '');
      return `<div class="wine-card photo-card" data-photo-id="${ea(photo.id||('p'+(idx+1)))}">
        <div class="card-header">
          <div>
            <p class="card-num">${num} / ${tot}</p>
            <p class="card-name" style="font-size:12px;color:rgba(255,255,255,0.45);">${ea(photo.src)||'(パス未設定)'}</p>
          </div>
        </div>
        <div class="card-actions">
          <button class="card-act-btn" data-gact="up">↑ 上へ</button>
          <button class="card-act-btn" data-gact="down">↓ 下へ</button>
          <button class="card-act-btn danger" data-gact="del">削除</button>
          <label class="vis-toggle"><input type="checkbox" data-field="visible"${checked}> <span>表示</span></label>
        </div>
        <div class="field-group">
          <label class="field-label">画像パス</label>
          <input type="text" class="field-input photo-src" data-field="src" value="${ea(photo.src)}" placeholder="images/gallery/photo.webp">
        </div>
        <div class="field-group">
          <label class="field-label">キャプション（日本語）</label>
          <input type="text" class="field-input" data-field="caption_ja" value="${ea(photo.caption_ja)}" placeholder="写真の説明（日本語）">
        </div>
        <div class="field-group">
          <label class="field-label">Caption (English)</label>
          <input type="text" class="field-input" data-field="caption_en" value="${ea(photo.caption_en)}" placeholder="Photo caption (English)">
        </div>
        <div class="field-group">
          <label class="field-label">フォーカス位置（object-position）</label>
          <input type="text" class="field-input" data-field="position" value="${ea(photo.position||'50% 50%')}" placeholder="50% 50% / top / center bottom / 50% 30%">
        </div>
      </div>`;
    }

    function buildGalleryCards(photos) {
      photos = Array.isArray(photos) ? photos : [];
      const grid = document.getElementById('gallery-grid');
      grid.innerHTML = photos.map((p, i) => generatePhotoCardHtml(p, i, photos.length)).join('');
      bindPhotoSrcSync();
    }

    function bindPhotoSrcSync() {
      document.querySelectorAll('.photo-src').forEach(input => {
        input.addEventListener('input', () => {
          const card = input.closest('.photo-card');
          card.querySelector('.card-name').textContent = input.value || '(パス未設定)';
        });
      });
    }

    function updatePhotoCardNums() {
      const cards = document.querySelectorAll('#gallery-grid .photo-card');
      const tot = String(cards.length).padStart(2,'0');
      cards.forEach((card, i) => {
        card.querySelector('.card-num').textContent = String(i+1).padStart(2,'0') + ' / ' + tot;
      });
    }

    document.getElementById('gallery-grid').addEventListener('click', e => {
      const btn = e.target.closest('[data-gact]');
      if (!btn) return;
      const card  = btn.closest('.photo-card');
      const grid  = document.getElementById('gallery-grid');
      const cards = Array.from(grid.querySelectorAll('.photo-card'));
      const idx   = cards.indexOf(card);
      const act   = btn.dataset.gact;
      if (act === 'up' && idx > 0)                       grid.insertBefore(card, cards[idx - 1]);
      else if (act === 'down' && idx < cards.length - 1) grid.insertBefore(cards[idx + 1], card);
      else if (act === 'del') {
        if (confirm('この写真をギャラリーから削除しますか？')) card.remove();
      }
      updatePhotoCardNums();
    });

    document.getElementById('add-photo-btn').addEventListener('click', () => {
      const grid  = document.getElementById('gallery-grid');
      const cards = grid.querySelectorAll('.photo-card');
      const newId = 'photo_' + Date.now();
      const newPhoto = { id: newId, src: '', caption_ja: '', caption_en: '', visible: true };
      const div = document.createElement('div');
      div.innerHTML = generatePhotoCardHtml(newPhoto, cards.length, cards.length + 1);
      const newCard = div.firstElementChild;
      grid.appendChild(newCard);
      newCard.querySelector('.photo-src').addEventListener('input', function() {
        newCard.querySelector('.card-name').textContent = this.value || '(パス未設定)';
      });
      updatePhotoCardNums();
      newCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
      newCard.querySelector('.field-input[data-field="src"]').focus();
    });

    async function loadGalleryData() {
      const token = localStorage.getItem('nwc_admin_t');
      if (!token) return;
      setStatus('ギャラリーデータ読み込み中...', 'loading');
      try {
        const res = await fetch(
          `https://api.github.com/repos/${OWNER}/${REPO}/contents/${GALLERY_PATH}`,
          { headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github+json' } }
        );
        if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.message||res.statusText); }
        const json = await res.json();
        gallerySha = json.sha;
        const data = JSON.parse(b64decode(json.content));
        buildGalleryCards(data.photos || []);
        setStatus('ギャラリーデータを読み込みました。', 'ok');
        setTimeout(() => setStatus('—', ''), 3000);
      } catch(e) {
        setStatus('ギャラリー読み込みエラー: ' + e.message, 'err');
      }
    }

    function collectGalleryData() {
      const photos = [];
      document.querySelectorAll('#gallery-grid .photo-card').forEach(card => {
        const get = f => { const el = card.querySelector(`[data-field="${f}"]`); return el ? el.value : ''; };
        const chk = f => { const el = card.querySelector(`[data-field="${f}"]`); return el ? el.checked : true; };
        photos.push({
          id:         card.dataset.photoId || ('p_' + Date.now()),
          src:        get('src'),
          position:   get('position') || '50% 50%',
          caption_ja: get('caption_ja'),
          caption_en: get('caption_en'),
          visible:    chk('visible'),
        });
      });
      return photos;
    }

    async function saveGalleryData() {
      const token = localStorage.getItem('nwc_admin_t');
      if (!token) { document.getElementById('token-banner').classList.add('show'); setStatus('GitHub Token が設定されていません。', 'err'); return; }
      if (!gallerySha) { setStatus('ギャラリーデータが読み込まれていません。ページを再読み込みしてください。', 'err'); return; }

      const saveBtn = document.getElementById('save-btn');
      saveBtn.textContent = '保存中...'; saveBtn.disabled = true;

      const now     = new Date().toISOString();
      const payload = { updatedAt: now, photos: collectGalleryData() };
      const content = b64encode(JSON.stringify(payload, null, 2));

      try {
        const res = await fetch(
          `https://api.github.com/repos/${OWNER}/${REPO}/contents/${GALLERY_PATH}`,
          {
            method: 'PUT',
            headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: 'admin: update gallery', content, sha: gallerySha, committer: { name: 'Nautae Admin', email: 'admin@faro-silencio.com' } }),
          }
        );
        if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.message||res.statusText); }
        const json = await res.json();
        gallerySha = json.content.sha;
        const fmt = new Date(now).toLocaleString('ja-JP', { year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit' });
        document.getElementById('save-updated').textContent = '最終更新: ' + fmt;
        setStatus('ギャラリーを保存しました。反映まで 1〜2 分かかります。', 'ok');
        setTimeout(() => setStatus('—', ''), 8000);
      } catch(e) {
        setStatus('保存エラー: ' + e.message, 'err');
      } finally {
        saveBtn.textContent = '保存する'; saveBtn.disabled = false;
      }
    }

    /* ===== GITHUB LOAD / SAVE ===== */
    let currentSha = null;

    async function loadWineData() {
      const token = localStorage.getItem('nwc_admin_t');
      if (!token) return;
      setStatus('読み込み中...', 'loading');
      try {
        const res = await fetch(
          `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`,
          { headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github+json' } }
        );
        if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.message||res.statusText); }
        const json = await res.json();
        currentSha = json.sha;
        const data = JSON.parse(b64decode(json.content));
        /* Support both array and legacy object format */
        const wines = Array.isArray(data.wines) ? data.wines : Object.entries(data.wines).map(([id,w])=>({id,...w}));
        buildWineCards(wines);
        if (data.updatedAt) {
          const fmt = new Date(data.updatedAt).toLocaleString('ja-JP', { year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit' });
          document.getElementById('save-updated').textContent = '最終更新: ' + fmt;
        }
        setStatus('データを読み込みました。', 'ok');
        setTimeout(() => setStatus('—', ''), 3000);
      } catch(e) {
        setStatus('読み込みエラー: ' + e.message, 'err');
      }
    }

    function collectFormData() {
      const wines = [];
      document.querySelectorAll('.wine-card[data-wine-id]').forEach(card => {
        const get  = f => { const el = card.querySelector(`[data-field="${f}"]`); return el ? el.value : ''; };
        const chk  = f => { const el = card.querySelector(`[data-field="${f}"]`); return el ? el.checked : true; };
        wines.push({
          id:         card.dataset.wineId,
          visible:    chk('visible'),
          status:     get('status'),
          name:       get('name'),
          nameSub:    get('nameSub'),
          label:      get('label'),
          price:      parseInt(get('price')) || 0,
          vintage:    get('vintage'),
          variety:    get('variety'),
          region:     get('region'),
          abv:        get('abv'),
          desc:       get('desc'),
          mobileDesc: get('mobileDesc'),
          pairing:    get('pairing'),
          image:      get('image'),
        });
      });
      return wines;
    }

    async function saveWineData() {
      const token = localStorage.getItem('nwc_admin_t');
      if (!token) { document.getElementById('token-banner').classList.add('show'); setStatus('GitHub Token が設定されていません。', 'err'); return; }
      if (!currentSha) { setStatus('データが読み込まれていません。ページを再読み込みしてください。', 'err'); return; }

      const saveBtn = document.getElementById('save-btn');
      saveBtn.textContent = '保存中...'; saveBtn.disabled = true;

      const now     = new Date().toISOString();
      const payload = { updatedAt: now, wines: collectFormData() };
      const content = b64encode(JSON.stringify(payload, null, 2));

      try {
        const res = await fetch(
          `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`,
          {
            method: 'PUT',
            headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: 'admin: update wine data', content, sha: currentSha, committer: { name: 'Nautae Admin', email: 'admin@faro-silencio.com' } }),
          }
        );
        if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.message||res.statusText); }
        const json = await res.json();
        currentSha = json.content.sha;
        const fmt = new Date(now).toLocaleString('ja-JP', { year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit' });
        document.getElementById('save-updated').textContent = '最終更新: ' + fmt;
        setStatus('保存しました。GitHub Pages への反映まで 1〜2 分かかります。', 'ok');
        setTimeout(() => setStatus('—', ''), 8000);
      } catch(e) {
        setStatus('保存エラー: ' + e.message, 'err');
      } finally {
        saveBtn.textContent = '保存する'; saveBtn.disabled = false;
      }
    }

    /* ===== INIT ADMIN ===== */
    function initAdmin() {
      const token = localStorage.getItem('nwc_admin_t');
      if (!token) { document.getElementById('token-banner').classList.add('show'); buildWineCards([]); setStatus('GitHub Token を設定してください。', ''); }
      else { loadWineData(); }

      document.getElementById('token-save-btn').addEventListener('click', () => {
        const t = document.getElementById('token-input').value.trim();
        if (!t) return;
        localStorage.setItem('nwc_admin_t', t);
        document.getElementById('token-banner').classList.remove('show');
        loadWineData();
      });
      document.getElementById('token-input').addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('token-save-btn').click(); });

      document.getElementById('new-token-save').addEventListener('click', () => {
        const t = document.getElementById('new-token-input').value.trim();
        if (!t) return;
        localStorage.setItem('nwc_admin_t', t);
        document.getElementById('new-token-input').value = '';
        document.getElementById('token-banner').classList.remove('show');
        setStatus('GitHub Token を更新しました。', 'ok'); setTimeout(() => setStatus('—', ''), 3000);
      });

      document.getElementById('change-pw-btn').addEventListener('click', async () => {
        const p1 = document.getElementById('new-pw1').value;
        const p2 = document.getElementById('new-pw2').value;
        const msg = document.getElementById('pw-change-msg');
        if (!p1)       { msg.style.color='#e08080'; msg.textContent='パスワードを入力してください。'; return; }
        if (p1 !== p2) { msg.style.color='#e08080'; msg.textContent='パスワードが一致しません。'; return; }
        if (p1.length < 6) { msg.style.color='#e08080'; msg.textContent='6文字以上で設定してください。'; return; }
        const newHash = await sha256(p1);
        document.getElementById('new-pw1').value = '';
        document.getElementById('new-pw2').value = '';
        msg.style.color='#c8a96e';
        msg.textContent = '新しいハッシュ（admin.htmlのADMIN_HASHに貼り替えてください）: ' + newHash;
      });

      document.getElementById('btn-logout').addEventListener('click', () => { sessionStorage.removeItem('nwc_admin_s'); location.reload(); });

      /* ===== TAB SWITCHING ===== */
      document.querySelectorAll('.admin-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          const t = tab.dataset.tab;
          document.querySelectorAll('.admin-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === t));
          const winesSec   = document.getElementById('wines-section');
          const gallerySec = document.getElementById('gallery-section');
          if (t === 'wines') {
            winesSec.style.display   = '';
            gallerySec.style.display = 'none';
          } else {
            winesSec.style.display   = 'none';
            gallerySec.style.display = 'block';
            if (!gallerySha) loadGalleryData();
          }
        });
      });

      document.getElementById('save-btn').addEventListener('click', () => {
        const activeTab = document.querySelector('.admin-tab.active');
        if (activeTab && activeTab.dataset.tab === 'gallery') saveGalleryData();
        else saveWineData();
      });
    }
  </script>
</body>
</html>
