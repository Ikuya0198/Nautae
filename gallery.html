<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — Nautae Wine Cellar</title>
  <meta name="description" content="Nautae Wine Cellar のギャラリー。ガリシアの大地と手造りワインの記録。">
  <link rel="preload" href="fonts/montserrat-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="fonts/cg-normal-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="images/logo white.webp" as="image">
  <link rel="stylesheet" href="fonts/fonts.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ===== GALLERY FULL-SCREEN ===== */
    #g-wrap {
      position: relative;
      height: 100vh;
      height: 100svh; /* iOS Safari: small viewport height — excludes browser chrome */
      overflow: hidden;
    }

    /* ===== SLIDES ===== */
    .g-slide {
      position: absolute; inset: 0;
      opacity: 0;
      transition: opacity 1.0s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .g-slide.active { opacity: 1; }

    /* Case C: 写真を額縁スタイルで表示 — 縦横比そのまま、余白あり */
    .g-slide img {
      display: block;
      max-height: calc(100vh - 140px);
      max-height: calc(100svh - 140px);
      max-width: calc(100% - 200px);
      width: auto;
      height: auto;
      object-fit: contain;
      filter: brightness(0.90) saturate(0.88);
      transform-origin: center center;
    }

    /* Ken Burns — 中央からゆっくりズームアウト */
    @keyframes kenBurns {
      from { transform: scale(1.06); }
      to   { transform: scale(1.00); }
    }
    .g-slide.active img { animation: kenBurns 14s ease forwards; }

    /* ===== TOP GRADIENT + TITLE OVERLAY ===== */
    #g-top-ui {
      position: absolute; top: 0; left: 0; right: 0; z-index: 5;
      background: linear-gradient(to bottom, rgba(0,0,0,0.52) 0%, transparent 100%);
      padding: 92px 52px 60px;
      pointer-events: none;
      opacity: 0; transition: opacity 1.0s;
    }
    #g-top-ui.ready { opacity: 1; }
    .g-page-label {
      font-size: 9px; letter-spacing: 4.5px; text-transform: uppercase;
      color: rgba(200,169,110,0.65); margin-bottom: 10px;
    }
    .g-page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(26px, 3vw, 42px); font-weight: 300; letter-spacing: 5px;
      color: rgba(255,255,255,0.80);
    }

    /* ===== NAVIGATION ARROWS ===== */
    .g-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      z-index: 10; cursor: pointer;
      color: rgba(255,255,255,0.50);
      background: rgba(0,0,0,0.22); border: 1px solid rgba(255,255,255,0.14);
      padding: 22px 18px;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      transition: color 0.35s, background 0.35s, border-color 0.35s;
    }
    .g-arrow:hover {
      color: rgba(255,255,255,0.92);
      background: rgba(0,0,0,0.40);
      border-color: rgba(255,255,255,0.32);
    }
    #g-prev { left: 28px; }
    #g-next { right: 28px; }

    /* ===== CAPTION ===== */
    #g-caption {
      position: absolute; bottom: 92px; left: 50%; transform: translateX(-50%);
      z-index: 8; text-align: center;
      font-size: 11px; letter-spacing: 1.5px; color: rgba(255,255,255,0.52);
      max-width: 620px; width: calc(100% - 180px); line-height: 1.9;
      text-shadow: 0 1px 10px rgba(0,0,0,0.75);
      pointer-events: none;
      transition: opacity 0.5s;
    }

    /* ===== BOTTOM UI ===== */
    #g-bottom-ui {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
      background: linear-gradient(to top, rgba(0,0,0,0.58) 0%, transparent 100%);
      padding: 56px 52px 36px;
      display: flex; align-items: flex-end; justify-content: space-between;
    }

    #g-counter {
      font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
      color: rgba(255,255,255,0.32);
    }

    #g-dots {
      position: absolute; left: 50%; bottom: 40px;
      transform: translateX(-50%);
      display: flex; gap: 9px; align-items: center;
    }
    .g-dot {
      width: 5px; height: 5px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.20); cursor: pointer;
      transition: background 0.45s, width 0.45s;
      padding: 0; position: relative; overflow: hidden;
    }
    .g-dot.active {
      background: rgba(200,169,110,0.22);
      width: 24px; border-radius: 3px;
    }
    /* プログレスバー: 7秒で左から右へ満タンになる */
    .g-dot.active::after {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 0; height: 100%;
      background: #c8a96e; border-radius: 3px;
      animation: dotFill 7s linear forwards;
    }
    @keyframes dotFill {
      from { width: 0%; }
      to   { width: 100%; }
    }

    /* ===== FOOTER BELOW GALLERY ===== */
    #gallery-footer {
      background: #050505;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .gf-inner {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 48px; max-width: 1200px; margin: 0 auto;
    }
    .gf-copy { font-size: 11px; color: rgba(255,255,255,0.38); letter-spacing: 0.5px; }
    .gf-links { display: flex; gap: 28px; }
    .gf-links a { font-size: 11px; color: rgba(255,255,255,0.38); letter-spacing: 0.5px; transition: color 0.3s; }
    .gf-links a:hover { color: rgba(255,255,255,0.65); }

    /* ===== NAV: always visible on gallery page ===== */
    #navbar {
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
      transition: none;
    }

    /* ===== MOBILE ===== */
    @media (max-width: 768px) {
      #g-wrap {
        height: 100svh; /* svh override for mobile — ensures gallery fits visible area */
      }
      .g-slide img {
        max-height: calc(100vh - 160px); /* fallback */
        max-height: calc(100svh - 160px); /* nav (~74px) × 2 + buffer → image clears nav */
        max-width: calc(100% - 80px);
      }
      .g-arrow { padding: 16px 13px; }
      #g-prev { left: 14px; }
      #g-next { right: 14px; }
      #g-bottom-ui { padding: 44px 24px 28px; }
      #g-top-ui { padding: 80px 24px 36px; }
      .g-arrow svg { width: 14px; height: 14px; }
      #g-dots { bottom: 32px; }
      #g-caption { bottom: 78px; font-size: 10px; width: calc(100% - 80px); letter-spacing: 1px; }
      .gf-inner { flex-direction: column; gap: 10px; padding: 16px 24px; text-align: center; }
    }
  </style>
</head>
<body>

  <!-- LOADER -->
  <div id="loader">
    <img src="images/logo white.webp" alt="Nautae" class="loader-logo-img">
    <div class="loader-bar"></div>
  </div>

  <!-- NAV (always scrolled on gallery page) -->
  <nav id="navbar" class="scrolled">
    <button class="nav-back" onclick="history.length>1?history.back():location.href='index.html'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      <span>Back</span>
    </button>
    <a href="index.html" class="nav-logo"><img src="images/logo white.webp" alt="Nautae Wine Cellar"></a>
    <ul class="nav-links">
      <li><a href="index.html">Story</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="gallery.html" class="active">Gallery</a></li>
      <li><a href="archive.html">Archive</a></li>
    </ul>
    <div class="lang-toggle">
      <button class="lang-btn" data-lang="ja">JP</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
    <button class="nav-burger" id="nav-burger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="mobile-menu" id="mobile-menu">
    <nav class="mobile-menu-links">
      <a href="index.html">Story</a>
      <a href="shop.html">Shop</a>
      <a href="gallery.html" class="active">Gallery</a>
      <a href="archive.html">Archive</a>
    </nav>
  </div>

  <!-- GALLERY -->
  <div id="g-wrap">

    <!-- Title overlay -->
    <div id="g-top-ui">
      <p class="g-page-label">Gallery</p>
      <h1 class="g-page-title">The Record</h1>
    </div>

    <!-- Slides built by JS from data/gallery.json -->

    <!-- Arrows -->
    <button class="g-arrow" id="g-prev" aria-label="Previous">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="g-arrow" id="g-next" aria-label="Next">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>

    <!-- Caption (center bottom) -->
    <p id="g-caption"></p>

    <!-- Bottom UI -->
    <div id="g-bottom-ui">
      <div id="g-counter">— — —</div>
      <div id="g-dots"></div>
    </div>

  </div>

  <!-- MINIMAL FOOTER -->
  <div id="gallery-footer">
    <div class="gf-inner">
      <p class="gf-copy">© 2026 Nautae Wine Cellar. All rights reserved.</p>
      <div class="gf-links">
        <a href="privacy.html">Privacy Policy</a>
        <a href="tokutei.html">特定商取引法に基づく表記</a>
        <a href="admin.html">Admin</a>
      </div>
    </div>
  </div>

  <script src="js/nav.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    /* ===== LOADER ===== */
    const isFirst = !sessionStorage.getItem('nwc_v');
    sessionStorage.setItem('nwc_v', '1');

    function hideLoader() {
      gsap.to('#loader', {
        yPercent: -100, duration: 0.85, ease: 'power3.inOut',
        onComplete: () => {
          document.getElementById('loader').style.display = 'none';
          document.getElementById('g-top-ui').classList.add('ready');
        }
      });
    }

    if (isFirst) {
      gsap.timeline()
        .to('.loader-logo-img', { opacity: 1, y: 0, duration: 0.9, ease: 'power2.out' }, 0.2)
        .to('.loader-bar',      { width: 96,    duration: 0.7, ease: 'power2.inOut'  }, 0.7)
        .to({}, { duration: 0.6 }).call(hideLoader);
    } else {
      gsap.to('#loader', {
        yPercent: -100, duration: 0.65, ease: 'power3.inOut', delay: 0.1,
        onComplete: () => {
          document.getElementById('loader').style.display = 'none';
          document.getElementById('g-top-ui').classList.add('ready');
        }
      });
    }

    /* ===== PAGE TRANSITION ===== */
    document.querySelectorAll('a[href]').forEach(link => {
      const h = link.getAttribute('href');
      if (!h || h.startsWith('#') || h.startsWith('http') || h.startsWith('mailto') || h.startsWith('tel')) return;
      link.addEventListener('click', e => {
        e.preventDefault();
        const el = document.getElementById('loader');
        el.style.display = 'flex';
        gsap.fromTo(el, { yPercent: -100 }, {
          yPercent: 0, duration: 0.52, ease: 'power3.inOut',
          onComplete: () => { window.location.href = h; }
        });
      });
    });

    /* ===== GALLERY ===== */
    let photos = [];
    let current = 0;
    let isAnimating = false;
    let autoTimer;
    let autoResume;
    const counter   = document.getElementById('g-counter');
    const dotsWrap  = document.getElementById('g-dots');
    const gWrap     = document.getElementById('g-wrap');
    const captionEl = document.getElementById('g-caption');
    const prevBtn   = document.getElementById('g-prev');
    const nextBtn   = document.getElementById('g-next');

    function pad(n) { return String(n).padStart(2, '0'); }
    function getLang() { return localStorage.getItem('nwc_lang') || 'en'; }

    function updateCaption(idx) {
      if (!captionEl || !photos[idx]) return;
      const p = photos[idx];
      captionEl.textContent = getLang() === 'en'
        ? (p.caption_en || p.caption_ja || '')
        : (p.caption_ja || '');
    }

    function updateUI() {
      counter.textContent = pad(current + 1) + ' — ' + pad(photos.length);
      Array.from(dotsWrap.querySelectorAll('.g-dot'))
        .forEach((d, i) => d.classList.toggle('active', i === current));
      updateCaption(current);
    }

    function goTo(index) {
      if (isAnimating || !photos.length) return;
      const TOTAL = photos.length;
      const next = ((index % TOTAL) + TOTAL) % TOTAL;
      if (next === current) return;
      isAnimating = true;

      const slides = Array.from(gWrap.querySelectorAll('.g-slide'));
      slides[current].classList.remove('active');
      current = next;
      slides[current].classList.add('active');

      const img = slides[current].querySelector('img');
      img.style.animation = 'none';
      void img.offsetWidth;
      img.style.animation = '';

      updateUI();
      setTimeout(() => { isAnimating = false; }, 1000);
    }

    function clearAuto() {
      clearInterval(autoTimer);
      clearTimeout(autoResume);
      autoResume = setTimeout(() => {
        autoTimer = setInterval(() => goTo(current + 1), 7000);
      }, 10000);
    }

    function buildGallery(list) {
      photos = list.filter(p => p.visible !== false);
      if (!photos.length) return;

      // Build slides (insert before arrows)
      photos.forEach((p, i) => {
        const slide = document.createElement('div');
        slide.className = 'g-slide' + (i === 0 ? ' active' : '');
        const img = document.createElement('img');
        img.src = p.src;
        img.alt = '';
        img.loading = i === 0 ? 'eager' : 'lazy';
        if (p.position) img.style.objectPosition = p.position;
        slide.appendChild(img);
        gWrap.insertBefore(slide, prevBtn);
      });

      // Build dots
      photos.forEach((_, i) => {
        const btn = document.createElement('button');
        btn.className = 'g-dot' + (i === 0 ? ' active' : '');
        btn.setAttribute('aria-label', 'Photo ' + (i + 1));
        btn.addEventListener('click', () => { clearAuto(); goTo(i); });
        dotsWrap.appendChild(btn);
      });

      // Initial state
      updateUI();

      // Arrow events
      prevBtn.addEventListener('click', () => { clearAuto(); goTo(current - 1); });
      nextBtn.addEventListener('click', () => { clearAuto(); goTo(current + 1); });

      // Keyboard
      document.addEventListener('keydown', e => {
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { clearAuto(); goTo(current + 1); }
        if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { clearAuto(); goTo(current - 1); }
      });

      // Touch swipe
      let txStart = 0;
      gWrap.addEventListener('touchstart', e => { txStart = e.touches[0].clientX; }, { passive: true });
      gWrap.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - txStart;
        if (Math.abs(dx) > 50) { clearAuto(); goTo(dx < 0 ? current + 1 : current - 1); }
      }, { passive: true });

      // Auto-advance every 7s
      autoTimer = setInterval(() => goTo(current + 1), 7000);
    }

    async function initGallery() {
      try {
        const r = await fetch('data/gallery.json?_=' + Date.now());
        if (r.ok) {
          const { photos: list } = await r.json();
          buildGallery(list || []);
        }
      } catch (e) {}
    }
    initGallery();

    /* ===== LANGUAGE TOGGLE ===== */
    const initLang = getLang();
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === initLang);
      btn.addEventListener('click', () => {
        const lang = btn.dataset.lang;
        localStorage.setItem('nwc_lang', lang);
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
        updateCaption(current);
      });
    });
  </script>
</body>
</html>
