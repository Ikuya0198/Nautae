<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — Nautae Wine Cellar</title>
  <meta name="description" content="Nautae Wine Cellar のギャラリー。ガリシアの大地と手造りワインの記録。">
  <link rel="preload" href="fonts/montserrat-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="fonts/cg-normal-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="images/logo white.webp" as="image">
  <link rel="preload" href="images/g1.webp" as="image">
  <link rel="stylesheet" href="fonts/fonts.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ===== GALLERY FULL-SCREEN ===== */
    #g-wrap {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== SLIDES ===== */
    .g-slide {
      position: absolute; inset: 0;
      opacity: 0;
      transition: opacity 1.0s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }
    .g-slide.active { opacity: 1; }

    .g-slide img {
      width: 100%; height: 100%; object-fit: cover;
      filter: brightness(0.80) saturate(0.88);
      transform-origin: center center;
    }

    /* Ken Burns — slow zoom on active slide */
    @keyframes kenBurns {
      from { transform: scale(1.08); }
      to   { transform: scale(1.00); }
    }
    .g-slide.active img { animation: kenBurns 14s ease forwards; }

    /* ===== TOP GRADIENT + TITLE OVERLAY ===== */
    #g-top-ui {
      position: absolute; top: 0; left: 0; right: 0; z-index: 5;
      background: linear-gradient(to bottom, rgba(0,0,0,0.52) 0%, transparent 100%);
      padding: 92px 52px 60px;
      pointer-events: none;
      opacity: 0; transition: opacity 1.0s;
    }
    #g-top-ui.ready { opacity: 1; }
    .g-page-label {
      font-size: 9px; letter-spacing: 4.5px; text-transform: uppercase;
      color: rgba(200,169,110,0.65); margin-bottom: 10px;
    }
    .g-page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(26px, 3vw, 42px); font-weight: 300; letter-spacing: 5px;
      color: rgba(255,255,255,0.80);
    }

    /* ===== NAVIGATION ARROWS ===== */
    .g-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      z-index: 10; background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.18); padding: 28px 22px;
      transition: color 0.45s;
    }
    .g-arrow:hover { color: rgba(255,255,255,0.65); }
    #g-prev { left: 0; }
    #g-next { right: 0; }

    /* ===== BOTTOM UI ===== */
    #g-bottom-ui {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
      background: linear-gradient(to top, rgba(0,0,0,0.58) 0%, transparent 100%);
      padding: 56px 52px 36px;
      display: flex; align-items: flex-end; justify-content: space-between;
    }

    #g-counter {
      font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
      color: rgba(255,255,255,0.32);
    }

    #g-dots {
      position: absolute; left: 50%; bottom: 40px;
      transform: translateX(-50%);
      display: flex; gap: 9px; align-items: center;
    }
    .g-dot {
      width: 5px; height: 5px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.20); cursor: pointer;
      transition: background 0.45s, transform 0.45s, width 0.45s;
      padding: 0;
    }
    .g-dot.active {
      background: #c8a96e; transform: scale(1);
      width: 20px; border-radius: 3px;
    }

    /* ===== FOOTER BELOW GALLERY ===== */
    #gallery-footer {
      background: #050505;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .gf-inner {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 48px; max-width: 1200px; margin: 0 auto;
    }
    .gf-copy { font-size: 11px; color: rgba(255,255,255,0.16); letter-spacing: 0.5px; }
    .gf-links { display: flex; gap: 28px; }
    .gf-links a { font-size: 11px; color: rgba(255,255,255,0.16); letter-spacing: 0.5px; transition: color 0.3s; }
    .gf-links a:hover { color: rgba(255,255,255,0.45); }

    /* ===== MOBILE ===== */
    @media (max-width: 768px) {
      .g-arrow { padding: 20px 14px; }
      #g-bottom-ui { padding: 44px 24px 28px; }
      #g-top-ui { padding: 80px 24px 36px; }
      .g-arrow svg { width: 14px; height: 14px; }
      #g-dots { bottom: 32px; }
      .gf-inner { flex-direction: column; gap: 10px; padding: 16px 24px; text-align: center; }
    }
  </style>
</head>
<body>

  <!-- LOADER -->
  <div id="loader">
    <img src="images/logo white.webp" alt="Nautae" class="loader-logo-img">
    <div class="loader-bar"></div>
  </div>

  <!-- NAV (always scrolled on gallery page) -->
  <nav id="navbar" class="scrolled">
    <button class="nav-back" onclick="history.length>1?history.back():location.href='index.html'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      <span>Back</span>
    </button>
    <a href="index.html" class="nav-logo"><img src="images/logo white.webp" alt="Nautae Wine Cellar"></a>
    <ul class="nav-links">
      <li><a href="index.html">Story</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="gallery.html" class="active">Gallery</a></li>
      <li><a href="archive.html">Archive</a></li>
    </ul>
  </nav>

  <!-- GALLERY -->
  <div id="g-wrap">

    <!-- Title overlay -->
    <div id="g-top-ui">
      <p class="g-page-label">Gallery</p>
      <h1 class="g-page-title">The Record</h1>
    </div>

    <!-- Slides — g1 through g10 -->
    <div class="g-slide active"><img src="images/g1.webp" alt="" loading="eager"></div>
    <div class="g-slide"><img src="images/g2.webp" alt="" loading="lazy"></div>
    <div class="g-slide"><img src="images/g3.webp" alt="" loading="lazy"></div>
    <div class="g-slide"><img src="images/g4.webp" alt="" loading="lazy"></div>
    <div class="g-slide"><img src="images/g5.webp" alt="" loading="lazy"></div>
    <div class="g-slide"><img src="images/g6.webp" alt="" loading="lazy"></div>
    <div class="g-slide"><img src="images/g7.webp" alt="" loading="lazy"></div>
    <div class="g-slide"><img src="images/g8.webp" alt="" loading="lazy"></div>
    <div class="g-slide"><img src="images/g9.webp" alt="" loading="lazy"></div>
    <div class="g-slide"><img src="images/g10.webp" alt="" loading="lazy"></div>

    <!-- Arrows -->
    <button class="g-arrow" id="g-prev" aria-label="Previous">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="g-arrow" id="g-next" aria-label="Next">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>

    <!-- Bottom UI -->
    <div id="g-bottom-ui">
      <div id="g-counter">01 — 10</div>
      <div id="g-dots"></div>
    </div>

  </div>

  <!-- MINIMAL FOOTER -->
  <div id="gallery-footer">
    <div class="gf-inner">
      <p class="gf-copy">© 2026 Nautae Wine Cellar. All rights reserved.</p>
      <div class="gf-links">
        <a href="privacy.html">Privacy Policy</a>
        <a href="tokutei.html">特定商取引法に基づく表記</a>
        <a href="admin.html">Admin</a>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    /* ===== LOADER ===== */
    const isFirst = !sessionStorage.getItem('nwc_v');
    sessionStorage.setItem('nwc_v', '1');

    function hideLoader() {
      gsap.to('#loader', {
        yPercent: -100, duration: 0.85, ease: 'power3.inOut',
        onComplete: () => {
          document.getElementById('loader').style.display = 'none';
          document.getElementById('g-top-ui').classList.add('ready');
        }
      });
    }

    if (isFirst) {
      gsap.timeline()
        .to('.loader-logo-img', { opacity: 1, y: 0, duration: 0.9, ease: 'power2.out' }, 0.2)
        .to('.loader-bar',      { width: 96,    duration: 0.7, ease: 'power2.inOut'  }, 0.7)
        .to({}, { duration: 0.6 }).call(hideLoader);
    } else {
      gsap.to('#loader', {
        yPercent: -100, duration: 0.65, ease: 'power3.inOut', delay: 0.1,
        onComplete: () => {
          document.getElementById('loader').style.display = 'none';
          document.getElementById('g-top-ui').classList.add('ready');
        }
      });
    }

    /* ===== PAGE TRANSITION ===== */
    document.querySelectorAll('a[href]').forEach(link => {
      const h = link.getAttribute('href');
      if (!h || h.startsWith('#') || h.startsWith('http') || h.startsWith('mailto') || h.startsWith('tel')) return;
      link.addEventListener('click', e => {
        e.preventDefault();
        const el = document.getElementById('loader');
        el.style.display = 'flex';
        gsap.fromTo(el, { yPercent: -100 }, {
          yPercent: 0, duration: 0.52, ease: 'power3.inOut',
          onComplete: () => { window.location.href = h; }
        });
      });
    });

    /* ===== GALLERY ===== */
    const slides = Array.from(document.querySelectorAll('.g-slide'));
    const counter = document.getElementById('g-counter');
    const dotsWrap = document.getElementById('g-dots');
    const TOTAL = slides.length;
    let current = 0;
    let isAnimating = false;
    let autoTimer;

    /* Build dots */
    slides.forEach((_, i) => {
      const btn = document.createElement('button');
      btn.className = 'g-dot' + (i === 0 ? ' active' : '');
      btn.setAttribute('aria-label', 'Photo ' + (i + 1));
      btn.addEventListener('click', () => { clearAuto(); goTo(i); });
      dotsWrap.appendChild(btn);
    });
    const dots = Array.from(dotsWrap.querySelectorAll('.g-dot'));

    function pad(n) { return String(n).padStart(2, '0'); }

    function updateUI() {
      counter.textContent = pad(current + 1) + ' — ' + pad(TOTAL);
      dots.forEach((d, i) => d.classList.toggle('active', i === current));
    }

    function goTo(index) {
      if (isAnimating) return;
      const next = ((index % TOTAL) + TOTAL) % TOTAL;
      if (next === current) return;
      isAnimating = true;

      slides[current].classList.remove('active');
      current = next;

      const slide = slides[current];
      slide.classList.add('active');

      /* Restart Ken Burns animation */
      const img = slide.querySelector('img');
      img.style.animation = 'none';
      void img.offsetWidth; /* reflow */
      img.style.animation = '';

      updateUI();
      setTimeout(() => { isAnimating = false; }, 1000);
    }

    function clearAuto() { clearInterval(autoTimer); }

    /* Navigation */
    document.getElementById('g-prev').addEventListener('click', () => { clearAuto(); goTo(current - 1); });
    document.getElementById('g-next').addEventListener('click', () => { clearAuto(); goTo(current + 1); });

    /* Keyboard */
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { clearAuto(); goTo(current + 1); }
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { clearAuto(); goTo(current - 1); }
    });

    /* Touch swipe */
    let txStart = 0;
    const wrap = document.getElementById('g-wrap');
    wrap.addEventListener('touchstart', e => { txStart = e.touches[0].clientX; }, { passive: true });
    wrap.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - txStart;
      if (Math.abs(dx) > 50) { clearAuto(); goTo(dx < 0 ? current + 1 : current - 1); }
    }, { passive: true });

    /* Auto-advance every 7s */
    autoTimer = setInterval(() => goTo(current + 1), 7000);
  </script>
</body>
</html>
